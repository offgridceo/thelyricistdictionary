<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lyricist Dictionary</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black tracking-wider uppercase text-amber-500">The Lyricist Dictionary</h1>
            <p class="text-zinc-400 mt-2">Deep contextual definitions, multi-use slang, and advanced rhyme mapping.</p>
        </header>

        <div class="flex gap-2 max-w-xl mx-auto mb-12">
            <input type="text" id="wordInput" placeholder="Enter a word (e.g., whitewash, paint, brick)..." 
                   class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-amber-500">
            <button onclick="searchWord()" 
                    class="bg-amber-500 hover:bg-amber-600 text-zinc-950 font-bold px-6 py-3 rounded-lg transition duration-200">
                Search
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <section id="dictionarySection" class="hidden bg-zinc-900 border border-zinc-800 rounded-xl p-6">
                    <div class="flex justify-between items-baseline mb-6 border-b border-zinc-800 pb-4">
                        <div>
                            <h2 id="displayWord" class="text-4xl font-black text-white capitalize tracking-wide">Word</h2>
                            <p id="phonetic" class="text-amber-400 font-mono mt-1 text-sm">/pronunciation/</p>
                        </div>
                    </div>
                    
                    <div id="definitionsContainer" class="space-y-6"></div>
                </section>
            </div>

            <div class="space-y-6">
                <section id="rhymeSection" class="hidden space-y-6">
                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">
                        <h3 class="text-lg font-bold text-emerald-400 mb-3 uppercase tracking-wider text-xs">Perfect Rhymes</h3>
                        <div id="perfectRhymes" class="flex flex-wrap gap-2 text-zinc-300"></div>
                    </div>

                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">
                        <h3 class="text-lg font-bold text-sky-400 mb-3 uppercase tracking-wider text-xs">Near & Slant Rhymes</h3>
                        <div id="nearRhymes" class="flex flex-wrap gap-2 text-zinc-300"></div>
                    </div>
                </section>
            </div>

        </div>
    </div>

    <script>
        async function searchWord() {
            const word = document.getElementById('wordInput').value.trim().toLowerCase();
            if (!word) return;

            // UI Reset
            document.getElementById('definitionsContainer').innerHTML = '<p class="text-zinc-500 dynamic-pulse">Digging up contexts and usage...</p>';
            document.getElementById('perfectRhymes').innerHTML = 'Loading...';
            document.getElementById('nearRhymes').innerHTML = 'Loading...';

            document.getElementById('dictionarySection').classList.remove('hidden');
            document.getElementById('rhymeSection').classList.remove('hidden');

            // 1. Fetch Extensive Contextual Dictionary Data
            try {
                const dictResponse = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                const dictData = await dictResponse.json();
                
                const container = document.getElementById('definitionsContainer');
                container.innerHTML = ''; // Clear loading state

                if (dictData.title === "No Definitions Found" || !Array.isArray(dictData)) {
                    container.innerHTML = `
                        <div class="text-zinc-400">
                            <p class="font-bold text-amber-500">No traditional dictionary definition found.</p>
                            <p class="text-sm mt-1">This might be strict modern slang, but you can still use the phonetic rhyme engine on the right.</p>
                        </div>`;
                    document.getElementById('displayWord').innerText = word;
                    document.getElementById('phonetic').innerText = "";
                } else {
                    // Set primary headers
                    const topEntry = dictData[0];
                    document.getElementById('displayWord').innerText = topEntry.word;
                    document.getElementById('phonetic').innerText = topEntry.phonetic || topEntry.phonetics.find(p => p.text)?.text || "";

                    // Loop through ALL dictionary entries and ALL parts of speech to map deep variations
                    let definitionCount = 0;

                    dictData.forEach((entry) => {
                        entry.meanings.forEach((meaning) => {
                            const partOfSpeech = meaning.partOfSpeech; // noun, verb, adjective, etc.

                            meaning.definitions.forEach((def) => {
                                definitionCount++;
                                
                                // Create a visual block for each distinct variation/context found
                                const block = document.createElement('div');
                                block.className = "bg-zinc-950/50 border border-zinc-800/60 rounded-lg p-4 space-y-2";

                                // Context Tag (e.g., "[noun] context")
                                const tag = document.createElement('span');
                                tag.className = "inline-block text-[10px] uppercase tracking-widest font-extrabold bg-zinc-800 text-zinc-300 px-2 py-0.5 rounded";
                                tag.innerText = partOfSpeech;
                                block.appendChild(tag);

                                // The Definition Text
                                const defText = document.createElement('p');
                                defText.className = "text-zinc-200 text-base leading-relaxed";
                                defText.innerText = def.definition;
                                block.appendChild(defText);

                                // Example Sentence (if the API provides it)
                                if (def.example) {
                                    const exText = document.createElement('p');
                                    exText.className = "text-amber-500/70 italic text-sm pl-3 border-l border-amber-500/30 mt-1";
                                    exText.innerText = `"${def.example}"`;
                                    block.appendChild(exText);
                                }

                                container.appendChild(block);
                            });
                        });
                    });
                }
            } catch (err) {
                console.error("Dictionary engine failure:", err);
                document.getElementById('definitionsContainer').innerHTML = '<p class="text-red-400 text-sm">Failed to retrieve semantic data.</p>';
            }

            // 2. Fetch Perfect Rhymes
            try {
                const pRhymeResponse = await fetch(`https://api.datamuse.com/words?rel_rhy=${word}&max=40`);
                const pRhymeData = await pRhymeResponse.json();
                displayRhymes(pRhymeData, 'perfectRhymes', 'bg-emerald-950/30 text-emerald-300 border border-emerald-800/40 hover:bg-emerald-900/40');
            } catch (err) {
                document.getElementById('perfectRhymes').innerText = "Unavailable.";
            }

            // 3. Fetch Near/Slant Rhymes
            try {
                const nRhymeResponse = await fetch(`https://api.datamuse.com/words?rel_nry=${word}&max=40`);
                const nRhymeData = await nRhymeResponse.json();
                displayRhymes(nRhymeData, 'nearRhymes', 'bg-sky-950/30 text-sky-300 border border-sky-800/40 hover:bg-sky-900/40');
            } catch (err) {
                document.getElementById('nearRhymes').innerText = "Unavailable.";
            }
        }

        function displayRhymes(data, elementId, stylingClasses) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<span class="text-zinc-600 italic text-xs">No matching phonetics found.</span>';
                return;
            }

            data.forEach(item => {
                const tag = document.createElement('span');
                tag.className = `px-2.5 py-1 rounded text-xs font-semibold cursor-pointer transition ${stylingClasses}`;
                tag.innerText = item.word;
                
                tag.onclick = () => {
                    document.getElementById('wordInput').value = item.word;
                    searchWord();
                };
                container.appendChild(tag);
            });
        }

        // Enter key shortcut execution
        document.getElementById('wordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchWord();
            }
        });
    </script>
</body>
</html>
